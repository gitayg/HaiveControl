name: build

# Builds the HaiveHub server binary for self-hosters. The AppCrane deploy builds the
# hub from source via the Dockerfile; the AGENT binaries (airm / haive-mcp / haivectl)
# live in the public gitayg/haive-agent repo and are pulled from its releases.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  id-token: write        # OIDC — mint the Sigstore identity for provenance
  attestations: write    # store the signed build-provenance attestation

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: windows
            ext: ".exe"
          - os: macos-latest
            suffix: macos
            ext: ""
          # Linux linked against an OLD glibc via cargo-zigbuild, so the hub binary
          # runs on Debian 12 / Ubuntu 22.04 and older self-host boxes too.
          - os: ubuntu-24.04
            suffix: linux
            ext: ""
            triple: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
            ext: ""
            triple: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Install zig + cargo-zigbuild (Linux — link an older glibc)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          pip3 install "ziglang==0.13.0"
          cargo install --locked cargo-zigbuild
          rustup target add ${{ matrix.triple }}

      - name: Build HaiveHub (Linux, glibc 2.31 floor)
        if: startsWith(matrix.os, 'ubuntu')
        run: cargo zigbuild --release -p haive-hub --target ${{ matrix.triple }}.2.31

      - name: Build HaiveHub (macOS / Windows)
        if: ${{ !startsWith(matrix.os, 'ubuntu') }}
        run: cargo build --release -p haive-hub

      - name: Collect artifact
        shell: bash
        run: |
          mkdir out
          dir="target/release"
          if [ -n "${{ matrix.triple }}" ]; then dir="target/${{ matrix.triple }}/release"; fi
          cp "${dir}/HaiveHub${{ matrix.ext }}" "out/HaiveHub-${{ matrix.suffix }}${{ matrix.ext }}"

      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: out/*

      - uses: actions/upload-artifact@v4
        with:
          name: HaiveHub-${{ matrix.suffix }}
          path: out/*

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/*

  checksums:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dl
      - name: Generate SHA256SUMS
        run: |
          : > SHA256SUMS
          find dl -type f | while read -r f; do
            printf '%s  %s\n' "$(sha256sum "$f" | cut -d' ' -f1)" "$(basename "$f")" >> SHA256SUMS
          done
          sort -k2 -o SHA256SUMS SHA256SUMS
          cat SHA256SUMS
      - uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS
