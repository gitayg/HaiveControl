name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: windows
            ext: ".exe"
          - os: macos-latest
            suffix: macos
            ext: ""
          - os: ubuntu-latest
            suffix: linux
            ext: ""
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Linux capture/input build deps
        if: matrix.os == 'ubuntu-latest'
        run: >
          sudo apt-get update && sudo apt-get install -y
          libxdo-dev libxcb1-dev libxcb-shm0-dev libxcb-randr0-dev
          libx11-dev libxtst-dev libdbus-1-dev pkg-config

      - name: Build all binaries
        run: cargo build --release

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir out
          for b in HaiveControl HaiveHub haivectl haive-mcp; do
            cp "target/release/${b}${{ matrix.ext }}" "out/${b}-${{ matrix.suffix }}${{ matrix.ext }}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: HaiveControl-${{ matrix.suffix }}
          path: out/*

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/*
