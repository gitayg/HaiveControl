name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            suffix: windows
            ext: ".exe"
          - os: macos-latest
            suffix: macos
            ext: ""
          # Linux builds run on 24.04 (its PipeWire/SPA headers are new enough for
          # the libspa crate) but link an OLD glibc via cargo-zigbuild, so the
          # binaries also run on Debian 12 / Ubuntu 22.04 and ARM SBCs (Radxa).
          - os: ubuntu-24.04
            suffix: linux
            ext: ""
            triple: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            suffix: linux-arm64
            ext: ""
            triple: aarch64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Linux capture/input build deps
        if: startsWith(matrix.os, 'ubuntu')
        run: >
          sudo apt-get update && sudo apt-get install -y
          libxcb1-dev libxcb-shm0-dev libxcb-randr0-dev
          libx11-dev libxtst-dev libdbus-1-dev pkg-config
          libwayland-dev libxkbcommon-dev
          libpipewire-0.3-dev libclang-dev
          libegl-dev libgl-dev libgles-dev libgbm-dev libdrm-dev

      - name: Install zig + cargo-zigbuild (Linux — link an older glibc)
        if: startsWith(matrix.os, 'ubuntu')
        run: |
          pip3 install "ziglang==0.13.0"
          cargo install --locked cargo-zigbuild
          rustup target add ${{ matrix.triple }}

      - name: Build all binaries (Linux, glibc 2.31 floor)
        if: startsWith(matrix.os, 'ubuntu')
        run: cargo zigbuild --release --target ${{ matrix.triple }}.2.31

      - name: Build all binaries (macOS / Windows)
        if: ${{ !startsWith(matrix.os, 'ubuntu') }}
        run: cargo build --release

      - name: Collect artifacts
        shell: bash
        run: |
          mkdir out
          dir="target/release"
          if [ -n "${{ matrix.triple }}" ]; then dir="target/${{ matrix.triple }}/release"; fi
          for b in HaiveControl HaiveHub haivectl haive-mcp; do
            cp "${dir}/${b}${{ matrix.ext }}" "out/${b}-${{ matrix.suffix }}${{ matrix.ext }}"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: HaiveControl-${{ matrix.suffix }}
          path: out/*

      - uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: out/*
